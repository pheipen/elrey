<!DOCTYPE html>
<html lang="de"><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="EL REY – EP von Reyan.Rami &amp; Vigaz Beats. Ab 26.06.26 überall verfügbar.">
    <title>EL REY — Reyan.Rami &amp; Vigaz Beats</title>
    <link rel="preconnect" href="https://fonts.googleapis.com/">
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin="">
    <link href="index_files/css2.css" rel="stylesheet">

    <style>
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

        :root {
            --red:    #B81C2A;
            --dark:   #0D0506;
            --cream:  #EAD8B8;
            --gold:   #C8A050;
            --text:   #F2E8D8;
            --muted:  rgba(242,232,216,0.38);
        }

        html, body { height:100%; }

        body {
            min-height: 100vh;
            background-color: var(--red);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: var(--text);
        }

        /* ── CARPET SVG (fixed bg) ── */
        #carpet {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* ── DARK OVERLAY ── */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(10, 3, 3, 0.56);
            z-index: 1;
        }

        /* ── CARPET BORDER FRAME ── */
        .frame {
            position: fixed;
            inset: 0;
            z-index: 10;
            pointer-events: none;
            border: 28px solid #0A0505;
            box-shadow:
                inset 0 0 0 2px #EAD8B8,
                inset 0 0 0 5px #0A0505,
                inset 0 0 0 7px #EAD8B8,
                inset 0 0 0 9px #0A0505;
        }
        @media (max-width: 540px) {
            .frame { border-width: 14px; }
        }

        /* ── CONTENT ── */
        .container {
            position: relative;
            z-index: 5;
            width: 100%;
            max-width: 480px;
            padding: 64px 32px 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        @keyframes rise {
            from { opacity:0; transform:translateY(16px); }
            to   { opacity:1; transform:translateY(0); }
        }
        @keyframes glow {
            0%,100% { text-shadow: 3px 3px 0 rgba(0,0,0,0.65), 0 0 60px rgba(234,216,184,0.08); }
            50%      { text-shadow: 3px 3px 0 rgba(0,0,0,0.65), 0 0 100px rgba(234,216,184,0.18); }
        }

        .a1 { animation: rise 0.9s ease 0.10s both; }
        .a2 { animation: rise 0.9s ease 0.30s both; }
        .a3 { animation: rise 0.9s ease 0.50s both, glow 6s ease 1.5s infinite; }
        .a4 { animation: rise 0.9s ease 0.68s both; }
        .a5 { animation: rise 0.9s ease 0.85s both; }
        .a6 { animation: rise 0.9s ease 1.05s both; }

        .label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.44em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 20px;
        }

        .orn { display:flex; align-items:center; gap:9px; width:100%; margin-bottom:16px; }
        .orn-l  { flex:1; height:1px; background:linear-gradient(90deg,transparent,var(--gold)); opacity:0.5; }
        .orn-r  { flex:1; height:1px; background:linear-gradient(90deg,var(--gold),transparent); opacity:0.5; }
        .orn-d  { width:6px; height:6px; background:var(--gold); transform:rotate(45deg); flex-shrink:0; opacity:0.7; }
        .orn-dt { width:3px; height:3px; background:var(--gold); transform:rotate(45deg); flex-shrink:0; opacity:0.5; }

        .title {
            font-family: 'Big Shoulders Display', sans-serif;
            font-weight: 900;
            font-size: clamp(96px, 28vw, 170px);
            line-height: 0.87;
            color: var(--text);
            letter-spacing: -0.01em;
            transform: scaleX(1.10);
            transform-origin: center;
            text-shadow: 3px 3px 0 rgba(0,0,0,0.65);
            margin-bottom: 20px;
        }

        .artist {
            font-size: 10.5px;
            letter-spacing: 0.30em;
            text-transform: uppercase;
            color: var(--text);
            opacity: 0.65;
            margin-bottom: 5px;
        }

        .date {
            font-size: 9.5px;
            letter-spacing: 0.40em;
            text-transform: uppercase;
            color: var(--gold);
            opacity: 0.70;
            margin-bottom: 50px;
        }

        .links { width:100%; display:flex; flex-direction:column; gap:9px; }

        .btn {
            display:flex; align-items:center; justify-content:center; gap:8px;
            width:100%; padding:16px 22px;
            font-family:'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size:11px; font-weight:700;
            letter-spacing:0.22em; text-transform:uppercase;
            text-decoration:none; cursor:pointer;
            transition: background 0.2s, color 0.2s, border-color 0.2s;
        }

        .btn-primary { background:var(--cream); color:#5C0D10; border:1px solid var(--cream); }
        .btn-primary:hover { background:var(--gold); border-color:var(--gold); color:#3A0606; }

        .btn-secondary { background:transparent; color:var(--text); border:1px solid rgba(242,232,216,0.30); }
        .btn-secondary:hover { border-color:rgba(242,232,216,0.65); }

        .ig-row { display:flex; gap:9px; width:100%; }
        .btn-ig { flex:1; background:transparent; color:var(--text); border:1px solid rgba(242,232,216,0.20); font-size:10px; letter-spacing:0.16em; }
        .btn-ig:hover { border-color:rgba(242,232,216,0.52); }

        .footer { margin-top:52px; font-size:8.5px; letter-spacing:0.22em; color:var(--muted); text-transform:uppercase; }
    </style>
</head>
<body>

<!-- ─────────── PERSIAN CARPET SVG ─────────── -->
<svg id="carpet" xmlns="http://www.w3.org/2000/svg">
<defs>

  <!-- ── PALMETTE (5-petal fan, pointing up from origin) ── -->
  <g id="palm">
    <ellipse cx="0" cy="-20" rx="6.5" ry="14" fill="#EAD8B8" opacity="0.88"></ellipse>
    <ellipse cx="0" cy="-20" rx="6" ry="12.5" fill="#EAD8B8" opacity="0.80" transform="rotate(-22)"></ellipse>
    <ellipse cx="0" cy="-20" rx="6" ry="12.5" fill="#EAD8B8" opacity="0.80" transform="rotate(22)"></ellipse>
    <ellipse cx="0" cy="-20" rx="4.8" ry="10" fill="#EAD8B8" opacity="0.68" transform="rotate(-42)"></ellipse>
    <ellipse cx="0" cy="-20" rx="4.8" ry="10" fill="#EAD8B8" opacity="0.68" transform="rotate(42)"></ellipse>
    <ellipse cx="0" cy="-5" rx="5.5" ry="3.5" fill="#C09050" opacity="0.80"></ellipse>
    <circle cx="0" cy="-3" r="2.5" fill="#EAD8B8" opacity="0.75"></circle>
  </g>

  <!-- ── MEDIUM PALMETTE (scaled 0.68) ── -->
  <g id="palm-md">
    <ellipse cx="0" cy="-14" rx="4.5" ry="9.5" fill="#EAD8B8" opacity="0.82"></ellipse>
    <ellipse cx="0" cy="-14" rx="4" ry="8.5" fill="#EAD8B8" opacity="0.74" transform="rotate(-22)"></ellipse>
    <ellipse cx="0" cy="-14" rx="4" ry="8.5" fill="#EAD8B8" opacity="0.74" transform="rotate(22)"></ellipse>
    <ellipse cx="0" cy="-14" rx="3.3" ry="6.8" fill="#EAD8B8" opacity="0.62" transform="rotate(-42)"></ellipse>
    <ellipse cx="0" cy="-14" rx="3.3" ry="6.8" fill="#EAD8B8" opacity="0.62" transform="rotate(42)"></ellipse>
    <ellipse cx="0" cy="-4" rx="3.8" ry="2.5" fill="#C09050" opacity="0.75"></ellipse>
    <circle cx="0" cy="-2" r="1.8" fill="#EAD8B8" opacity="0.7"></circle>
  </g>

  <!-- ── 6-PETAL ROSETTE ── -->
  <g id="f6">
    <ellipse cx="0" cy="-8" rx="3" ry="5.5" fill="#EAD8B8" opacity="0.78"></ellipse>
    <ellipse cx="0" cy="-8" rx="3" ry="5.5" fill="#EAD8B8" opacity="0.78" transform="rotate(60)"></ellipse>
    <ellipse cx="0" cy="-8" rx="3" ry="5.5" fill="#EAD8B8" opacity="0.78" transform="rotate(120)"></ellipse>
    <ellipse cx="0" cy="-8" rx="3" ry="5.5" fill="#EAD8B8" opacity="0.78" transform="rotate(180)"></ellipse>
    <ellipse cx="0" cy="-8" rx="3" ry="5.5" fill="#EAD8B8" opacity="0.78" transform="rotate(240)"></ellipse>
    <ellipse cx="0" cy="-8" rx="3" ry="5.5" fill="#EAD8B8" opacity="0.78" transform="rotate(300)"></ellipse>
    <circle cx="0" cy="0" r="3.5" fill="#C09050" opacity="0.85"></circle>
    <circle cx="0" cy="0" r="1.8" fill="#EAD8B8" opacity="0.9"></circle>
  </g>

  <!-- ── 4-PETAL SMALL FLOWER ── -->
  <g id="f4">
    <ellipse cx="0" cy="-4.5" rx="1.8" ry="3.5" fill="#EAD8B8" opacity="0.65"></ellipse>
    <ellipse cx="0" cy="-4.5" rx="1.8" ry="3.5" fill="#EAD8B8" opacity="0.65" transform="rotate(90)"></ellipse>
    <ellipse cx="0" cy="-4.5" rx="1.8" ry="3.5" fill="#EAD8B8" opacity="0.65" transform="rotate(180)"></ellipse>
    <ellipse cx="0" cy="-4.5" rx="1.8" ry="3.5" fill="#EAD8B8" opacity="0.65" transform="rotate(270)"></ellipse>
    <circle cx="0" cy="0" r="2" fill="#C09050" opacity="0.80"></circle>
  </g>

  <!-- ── LEAF ── -->
  <g id="lf">
    <path d="M 0,-5.5 C 2.5,-2.5 2.5,1.5 0,3.5 C -2.5,1.5 -2.5,-2.5 0,-5.5 Z" fill="#8A6030" opacity="0.62"></path>
  </g>

  <!-- ══════════════ CARPET TILE (200×200) ══════════════ -->
  <pattern id="rug" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">

    <!-- ── Base red field ── -->
    <rect width="200" height="200" fill="#B81C2A"></rect>

    <!-- Subtle depth lines (very faint darker grid under the motifs) -->
    <line x1="100" y1="0" x2="100" y2="200" stroke="#9A1520" stroke-width="0.4" opacity="0.18"></line>
    <line x1="0" y1="100" x2="200" y2="100" stroke="#9A1520" stroke-width="0.4" opacity="0.18"></line>

    <!-- ═══ VINES ═══ -->

    <!-- Primary H vine (S-curve) -->
    <path d="M 0,100 C 36,54 64,54 100,100 C 136,146 164,146 200,100" fill="none" stroke="#EAD8B8" stroke-width="2" stroke-linecap="round" opacity="0.80"></path>
    <!-- Mirror H vine -->
    <path d="M 0,100 C 36,146 64,146 100,100 C 136,54 164,54 200,100" fill="none" stroke="#EAD8B8" stroke-width="0.9" stroke-linecap="round" opacity="0.35"></path>

    <!-- Primary V vine (S-curve) -->
    <path d="M 100,0 C 54,36 54,64 100,100 C 146,136 146,164 100,200" fill="none" stroke="#EAD8B8" stroke-width="2" stroke-linecap="round" opacity="0.80"></path>
    <!-- Mirror V vine -->
    <path d="M 100,0 C 146,36 146,64 100,100 C 54,136 54,164 100,200" fill="none" stroke="#EAD8B8" stroke-width="0.9" stroke-linecap="round" opacity="0.35"></path>

    <!-- Diagonal branches from centre -->
    <path d="M 100,100 C 82,82 60,60 42,42" fill="none" stroke="#EAD8B8" stroke-width="1.5" stroke-linecap="round" opacity="0.70"></path>
    <path d="M 100,100 C 118,82 140,60 158,42" fill="none" stroke="#EAD8B8" stroke-width="1.5" stroke-linecap="round" opacity="0.70"></path>
    <path d="M 100,100 C 82,118 60,140 42,158" fill="none" stroke="#EAD8B8" stroke-width="1.5" stroke-linecap="round" opacity="0.70"></path>
    <path d="M 100,100 C 118,118 140,140 158,158" fill="none" stroke="#EAD8B8" stroke-width="1.5" stroke-linecap="round" opacity="0.70"></path>

    <!-- Sub-branches from H-vine midpoints (~50,68 and ~150,132) -->
    <path d="M 50,68 C 44,56 36,48 28,40" fill="none" stroke="#EAD8B8" stroke-width="1.1" stroke-linecap="round" opacity="0.58"></path>
    <path d="M 50,68 C 44,80 36,88 28,96" fill="none" stroke="#EAD8B8" stroke-width="1.1" stroke-linecap="round" opacity="0.58"></path>
    <path d="M 150,132 C 156,120 164,112 172,104" fill="none" stroke="#EAD8B8" stroke-width="1.1" stroke-linecap="round" opacity="0.58"></path>
    <path d="M 150,132 C 156,144 164,152 172,160" fill="none" stroke="#EAD8B8" stroke-width="1.1" stroke-linecap="round" opacity="0.58"></path>

    <!-- Sub-branches from V-vine midpoints (~68,50 and ~132,150) -->
    <path d="M 68,50 C 56,44 48,36 40,28" fill="none" stroke="#EAD8B8" stroke-width="1.1" stroke-linecap="round" opacity="0.58"></path>
    <path d="M 68,50 C 80,44 88,36 96,28" fill="none" stroke="#EAD8B8" stroke-width="1.1" stroke-linecap="round" opacity="0.58"></path>
    <path d="M 132,150 C 120,156 112,164 104,172" fill="none" stroke="#EAD8B8" stroke-width="1.1" stroke-linecap="round" opacity="0.58"></path>
    <path d="M 132,150 C 144,156 152,164 160,172" fill="none" stroke="#EAD8B8" stroke-width="1.1" stroke-linecap="round" opacity="0.58"></path>

    <!-- Tiny curling vine tendrils from diag midpoints -->
    <path d="M 70,70 C 65,62 60,58 56,54" fill="none" stroke="#EAD8B8" stroke-width="0.8" stroke-linecap="round" opacity="0.45"></path>
    <path d="M 130,70 C 135,62 140,58 144,54" fill="none" stroke="#EAD8B8" stroke-width="0.8" stroke-linecap="round" opacity="0.45"></path>
    <path d="M 70,130 C 65,138 60,142 56,146" fill="none" stroke="#EAD8B8" stroke-width="0.8" stroke-linecap="round" opacity="0.45"></path>
    <path d="M 130,130 C 135,138 140,142 144,146" fill="none" stroke="#EAD8B8" stroke-width="0.8" stroke-linecap="round" opacity="0.45"></path>

    <!-- ═══ LEAVES ═══ -->
    <use href="#lf" transform="translate(24,54) rotate(-50)"></use>
    <use href="#lf" transform="translate(24,90) rotate(50)"></use>
    <use href="#lf" transform="translate(176,110) rotate(-130)"></use>
    <use href="#lf" transform="translate(176,146) rotate(130)"></use>
    <use href="#lf" transform="translate(54,24) rotate(40)"></use>
    <use href="#lf" transform="translate(90,24) rotate(-40)"></use>
    <use href="#lf" transform="translate(110,176) rotate(140)"></use>
    <use href="#lf" transform="translate(146,176) rotate(-140)"></use>
    <!-- leaves on diagonal branches -->
    <use href="#lf" transform="translate(60,60) rotate(-45)"></use>
    <use href="#lf" transform="translate(140,60) rotate(45)"></use>
    <use href="#lf" transform="translate(60,140) rotate(45)"></use>
    <use href="#lf" transform="translate(140,140) rotate(-45)"></use>
    <!-- leaves mid-vine -->
    <use href="#lf" transform="translate(50,68) rotate(-10)"></use>
    <use href="#lf" transform="translate(150,132) rotate(170)"></use>
    <use href="#lf" transform="translate(68,50) rotate(80)"></use>
    <use href="#lf" transform="translate(132,150) rotate(-100)"></use>

    <!-- ═══ FLOWERS ═══ -->

    <!-- CENTER: large palmette pointing up -->
    <use href="#palm" transform="translate(100,100)"></use>

    <!-- DIAGONAL QUARTERS: medium palmettes pointing toward center -->
    <use href="#palm-md" transform="translate(44,44) rotate(135)"></use>
    <use href="#palm-md" transform="translate(156,44) rotate(225)"></use>
    <use href="#palm-md" transform="translate(44,156) rotate(45)"></use>
    <use href="#palm-md" transform="translate(156,156) rotate(315)"></use>

    <!-- H-VINE MIDPOINTS: 6-petal rosettes -->
    <use href="#f6" transform="translate(50,68)"></use>
    <use href="#f6" transform="translate(150,132)"></use>

    <!-- V-VINE MIDPOINTS: 6-petal rosettes -->
    <use href="#f6" transform="translate(68,50)"></use>
    <use href="#f6" transform="translate(132,150)"></use>

    <!-- EDGE MIDPOINTS: small palmettes pointing into tile -->
    <use href="#palm-md" transform="translate(100,0) rotate(180)"></use>
    <use href="#palm-md" transform="translate(100,200)"></use>
    <use href="#palm-md" transform="translate(0,100) rotate(90)"></use>
    <use href="#palm-md" transform="translate(200,100) rotate(270)"></use>

    <!-- SUB-BRANCH TIPS: 4-petal flowers -->
    <use href="#f4" transform="translate(28,40)"></use>
    <use href="#f4" transform="translate(28,96)"></use>
    <use href="#f4" transform="translate(172,104)"></use>
    <use href="#f4" transform="translate(172,160)"></use>
    <use href="#f4" transform="translate(40,28)"></use>
    <use href="#f4" transform="translate(96,28)"></use>
    <use href="#f4" transform="translate(104,172)"></use>
    <use href="#f4" transform="translate(160,172)"></use>

    <!-- CORNER QUARTER FLOWERS: -->
    <use href="#f6" transform="translate(0,0)"></use>
    <use href="#f6" transform="translate(200,0)"></use>
    <use href="#f6" transform="translate(0,200)"></use>
    <use href="#f6" transform="translate(200,200)"></use>

    <!-- Tiny accent dots on vine inflection points -->
    <circle cx="100" cy="68" r="1.5" fill="#EAD8B8" opacity="0.40"></circle>
    <circle cx="100" cy="132" r="1.5" fill="#EAD8B8" opacity="0.40"></circle>
    <circle cx="68" cy="100" r="1.5" fill="#EAD8B8" opacity="0.40"></circle>
    <circle cx="132" cy="100" r="1.5" fill="#EAD8B8" opacity="0.40"></circle>

  </pattern>

</defs>
<rect width="100%" height="100%" fill="url(#rug)"></rect>
</svg>
